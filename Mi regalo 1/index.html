<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños a la Mejor Madre - Jesús</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #f8bbd0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .container {
            text-align: center;
            max-width: 92%;
            margin: 20px auto;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(233, 30, 99, 0.25);
            position: relative;
            z-index: 2;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.65rem;
            color: #e91e63;
            margin: 0 0 15px 0;
            line-height: 1.15;
        }
        
        .subtitle {
            font-size: 1.4rem;
            color: #c2185b;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .message {
            font-size: 1.28rem;
            color: #444;
            line-height: 1.8;
            margin: 30px 0;
            padding: 0 15px;
        }
        
        .signature {
            font-size: 1.45rem;
            color: #e91e63;
            font-weight: 600;
            margin-top: 35px;
            font-style: italic;
        }
        
        .heart {
            color: #e91e63;
            font-size: 2.1rem;
            animation: heartbeat 1.4s infinite;
        }
        
        .cake {
            font-size: 4.8rem;
            margin: 15px 0 25px 0;
        }
        
        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(#e91e63, #c2185b);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.4);
        }
        
        .button:active {
            transform: scale(0.95);
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        .balloon {
            position: absolute;
            font-size: 2.3rem;
            z-index: 1;
            animation: float 18s linear infinite;
            opacity: 0.8;
        }
        
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-40px) rotate(30deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Feliz Cumpleaños a la Mejor Madre del Mundo! 🎂</h1>
        <div class="cake">🎉🥳💖</div>
        
        <p class="subtitle">Aunque sea un poquito tarde...</p>
        
        <div class="message">
            Te deseo un feliz cumpleaños atrasado.<br><br>
            Eres la mejor madre del mundo.<br><br>
            Te quiero mucho.<br><br>
            De parte de tu hijo Jesús.
        </div>
        
        <p class="signature">
            Con todo mi cariño <span class="heart">❤️</span>
        </p>
        
        <a href="#" onclick="alert('¡Feliz Cumpleaños a la mejor mamá del mundo! 💕 Te quiero mucho ✨')" class="button">
            Enviar abrazo fuerte 🫂
        </a>
    </div>

    <script>
        function createBalloons() {
            const emojis = ['🎈', '💖', '🌸', '✨', '🥰', '🌷', '🎂'];
            const container = document.body;
            
            for (let i = 0; i < 20; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.animationDuration = (15 + Math.random() * 10) + 's';
                balloon.style.animationDelay = '-' + (Math.random() * 25) + 's';
                container.appendChild(balloon);
                
                setTimeout(() => balloon.remove(), 50000);
            }
        }
        
        window.onload = () => {
            createBalloons();
            setInterval(createBalloons, 13000);
        };
    </script>
</body>
</html>
